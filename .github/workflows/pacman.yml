name: Generate pacman animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate Pacman Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch

      - name: Copy generated SVG to output
        run: |
          cp dist/pacman-contribution-graph.svg output-branch/pacman-contribution-graph.svg
          cp dist/pacman-contribution-graph-dark.svg output-branch/pacman-contribution-graph-dark.svg || true

      - name: Commit and push to output branch
        working-directory: output-branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pacman-contribution-graph*.svg
          git commit -m "Update pacman contribution graph" || echo "No changes to commit"
          git push origin output